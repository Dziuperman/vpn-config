project_root: /opt/xray-vpn
xray_deploy_user: root
xray_deploy_group: root
xray_manage_firewall: true
xray_pull_image: true
xray_run_validate: true
xray_run_doctor: true
xray_fetch_client_artifacts: false
xray_client_artifact_dir: "{{ playbook_dir }}/../../.generated/ansible/{{ inventory_hostname }}"
xray_firewall_ssh_port: "{{ ansible_port | default(22) }}"
