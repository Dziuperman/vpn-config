- name: Fail on unsupported host OS
  ansible.builtin.assert:
    that:
      - ansible_facts["distribution"] | lower in ['ubuntu', 'debian']
    fail_msg: "This role supports Ubuntu and Debian only."

- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Docker repository signing key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"

- name: Convert Docker signing key to gpg format
  ansible.builtin.command:
    argv:
      - gpg
      - --dearmor
      - --yes
      - -o
      - /etc/apt/keyrings/docker.gpg
      - /etc/apt/keyrings/docker.asc
    creates: /etc/apt/keyrings/docker.gpg
  register: docker_keyring_result
  changed_when: docker_keyring_result.rc == 0

- name: Ensure Docker keyring permissions
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.gpg
    owner: root
    group: root
    mode: "0644"

- name: Configure Docker apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    owner: root
    group: root
    mode: "0644"
    content: |
      deb [arch={{ docker_apt_arch_map.get(ansible_facts['architecture'], ansible_facts['architecture']) }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }} {{ ansible_facts['distribution_release'] }} stable
  vars:
    docker_apt_arch_map:
      x86_64: amd64
      aarch64: arm64

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
