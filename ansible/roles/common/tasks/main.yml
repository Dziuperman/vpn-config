- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - openssl
      - rsync
      - ufw
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts["os_family"] == "Debian"

- name: Ensure project root parent exists
  ansible.builtin.file:
    path: "{{ xray_project_root | dirname }}"
    state: directory
    owner: "{{ xray_deploy_user }}"
    group: "{{ xray_deploy_group }}"
    mode: "0755"
